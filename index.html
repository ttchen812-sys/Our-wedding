<script>
    const container = document.getElementById('wedding-gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    // 直接告诉网页你的 GitHub 用户名和仓库名
    const username = 'ttchen812-sys'; 
    const repo = 'Our-wedding';
    const folder = 'image';

    // 自动获取 GitHub 文件夹里的所有文件列表
    fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
        .then(response => response.json())
        .then(data => {
            data.forEach(file => {
                // 只读取图片文件
                if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    const img = document.createElement('img');
                    img.src = file.download_url; // 直接使用 GitHub 提供的下载地址
                    img.className = 'zoomable';
                    img.loading = 'lazy';
                    
                    img.onclick = function() {
                        lightboxImg.src = this.src;
                        lightbox.classList.add('active');
                    }
                    container.appendChild(img);
                }
            });
        })
        .catch(err => console.log('读取图片失败:', err));

    lightbox.onclick = function() {
        this.classList.remove('active');
    }
</script>
