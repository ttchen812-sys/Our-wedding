<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding</title>
    <style>
        body { margin: 0; background: #fdfcfb; text-align: center; font-family: sans-serif; }
        header { padding: 60px 20px; }
        h1 { color: #a68b7c; font-weight: 300; letter-spacing: 2px; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto;
        }
        .gallery img { width: 100%; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header>
        <h1>OUR WEDDING</h1>
        <p>捕捉爱与光影的瞬间</p>
    </header>

    <div class="gallery">
        <img src="image/1.webp.jpg">
        <img src="image/2.webp.jpg">
        <img src="image/3.webp.jpg">
        <img src="image/4.webp.jpg">
        <img src="image/5.webp.jpg">
        <img src="image/6.webp.jpg">
    </div>

    <footer style="padding: 50px; color: #ccc;">FOR ETERNITY · 2026</footer>
</body>
</html>
